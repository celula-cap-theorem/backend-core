name: CI/CD - Main

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CONTAINER_NAME: cap-theorem-backend-prod
  HOST_PORT: 8080

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore cap_theorem_backend/cap_theorem_backend.csproj

      - name: Build
        run: dotnet build cap_theorem_backend/cap_theorem_backend.csproj --configuration Release --no-restore

      # TODO: uncomment once a test project exists
      # - name: Test
      #   run: dotnet test --configuration Release --no-build

  build-and-push-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image (tag: latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH to the VPS (prod)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              --network sql_server_databases \
              -p ${{ env.HOST_PORT }}:8080 \
              -e ConnectionStrings__ProvisioningControl="${{ secrets.PROVISIONING_DB_CONNECTION }}" \
              -e Jwt__Key="${{ secrets.JWT_KEY }}" \
              -e Authentication__Google__ClientId="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e Authentication__Google__ClientSecret="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e Authentication__GitHub__ClientId="${{ secrets.GITHUB_OAUTH_CLIENT_ID }}" \
              -e Authentication__GitHub__ClientSecret="${{ secrets.GITHUB_OAUTH_CLIENT_SECRET }}" \
              -e MySqlAdmin__Host="${{ secrets.MYSQL_HOST }}" \
              -e MySqlAdmin__ConnectionString="${{ secrets.MYSQL_ADMIN_CONNECTION }}" \
              -e Frontend__PostLoginRedirect="${{ secrets.FRONTEND_POST_LOGIN_REDIRECT }}" \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            docker image prune -f
